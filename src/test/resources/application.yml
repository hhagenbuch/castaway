# Test profile: never probe the real network from a context/unit test.
castaway:
  link:
    probe-enabled: false
  local:
    base-url: http://localhost:11434
    model: test-local
  outbox:
    path: target/castaway-test-outbox.db
agent:
  api-key: ""

spring:
  datasource:
    url: jdbc:sqlite:${castaway.outbox.path}
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
